<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好事坏事记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <h1>好事坏事记录</h1>
      <p class="subtitle">记录生活中的点点滴滴</p>
    </header>

    <!-- 统计面板（由 JS 动态生成） -->
    <section class="stats-panel" id="statsPanel"></section>

    <!-- 操作按钮 -->
    <section class="action-buttons">
      <button class="btn btn-good" onclick="openModal('good')">
        <span class="btn-icon">+</span>
        <span class="btn-text">记录好事</span>
      </button>
      <button class="btn btn-bad" onclick="openModal('bad')">
        <span class="btn-icon">+</span>
        <span class="btn-text">记录坏事</span>
      </button>
    </section>

    <!-- 历史记录 -->
    <section class="history-section">
      <div class="section-tabs">
        <button class="tab-btn active" id="historyTab" onclick="switchView('history')">📋 历史记录</button>
        <button class="tab-btn" id="trashTab" onclick="switchView('trash')">🗑️ 回收站</button>
      </div>

      <!-- 历史记录视图 -->
      <div id="historySection">
        <div class="filter-bar">
          <select id="userFilter" onchange="filterEvents()"></select>
          <select id="typeFilter" onchange="filterEvents()">
            <option value="all">所有类型</option>
            <option value="good">好事</option>
            <option value="bad">坏事</option>
          </select>
        </div>
        <div class="events-list" id="eventsList">
          <!-- 事件列表将在这里动态生成 -->
        </div>
      </div>

      <!-- 回收站视图 -->
      <div id="trashSection" style="display: none;">
        <div class="trash-header">
          <span class="trash-hint">已删除的记录会保留在这里，可随时恢复</span>
          <button class="btn btn-empty-trash" onclick="emptyTrash()">清空回收站</button>
        </div>
        <div class="events-list" id="trashList">
          <!-- 回收站列表将在这里动态生成 -->
        </div>
      </div>
    </section>
  </div>

  <!-- 弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">记录好事</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="eventContent">事件内容</label>
          <textarea id="eventContent" placeholder="发生了什么好事？" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="eventObject">对象</label>
          <input type="text" id="eventObject" placeholder="关于谁/什么？">
        </div>
        <div class="form-group">
          <label>记录人</label>
          <div class="user-select" id="userSelect"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn btn-submit" id="submitBtn" onclick="submitEvent()">确认记录</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
