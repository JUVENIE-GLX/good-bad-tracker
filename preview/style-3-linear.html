<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风格3: Linear 暗黑</title>
<style>
:root {
  --good: #3ecf8e;
  --bad: #f87171;
  --fg: #f5f5f5;
  --fg2: #888;
  --bg: #0a0a0a;
  --bg2: #141414;
  --bg3: #1c1c1c;
  --border: #262626;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--fg); line-height:1.5; }
.wrap { max-width:680px; margin:0 auto; padding:24px; }

/* 头部 */
.head { text-align:center; padding:48px 0 32px; }
.head h1 { font-size:28px; font-weight:600; letter-spacing:-0.02em; background:linear-gradient(135deg,var(--good),var(--bad)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.head p { color:var(--fg2); font-size:14px; margin-top:6px; }

/* 统计 */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:28px; }
.s-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; transition:all .15s; }
.s-card:hover { background:var(--bg3); border-color:#333; }
.s-user { font-size:11px; color:var(--fg2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
.s-num { font-size:32px; font-weight:700; line-height:1; margin-bottom:6px; }
.s-card.g .s-num { color:var(--good); }
.s-card.b .s-num { color:var(--bad); }
.s-lbl { font-size:13px; color:var(--fg2); }

/* 按钮 */
.btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:28px; }
.btn { padding:14px; border:1px solid var(--border); border-radius:10px; font-size:15px; font-weight:500; cursor:pointer; transition:all .15s; }
.btn:hover { transform:translateY(-1px); }
.btn-g { background:rgba(62,207,142,0.1); color:var(--good); border-color:rgba(62,207,142,0.3); }
.btn-g:hover { background:rgba(62,207,142,0.2); }
.btn-b { background:rgba(248,113,113,0.1); color:var(--bad); border-color:rgba(248,113,113,0.3); }
.btn-b:hover { background:rgba(248,113,113,0.2); }

/* 列表区 */
.list-area { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; }
.tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:16px; }
.tab { flex:1; padding:10px; border:none; background:none; font-size:14px; color:var(--fg2); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
.tab.on { color:var(--fg); border-bottom-color:var(--fg); }

/* 事件 */
.evt { display:flex; align-items:flex-start; gap:12px; padding:12px 14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; transition:all .15s; }
.evt:hover { background:var(--bg3); border-color:#333; }
.evt-icon { width:32px; height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.evt.g .evt-icon { background:rgba(62,207,142,0.15); color:var(--good); }
.evt.b .evt-icon { background:rgba(248,113,113,0.15); color:var(--bad); }
.evt-body { flex:1; }
.evt-text { font-size:14px; font-weight:500; margin-bottom:4px; }
.evt-meta { font-size:12px; color:var(--fg2); display:flex; gap:10px; flex-wrap:wrap; }
.tag { padding:2px 8px; border-radius:99px; font-size:11px; font-weight:500; }
.tag.g { background:rgba(62,207,142,0.15); color:var(--good); }
.tag.b { background:rgba(248,113,113,0.15); color:var(--bad); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>好事坏事记录</h1>
    <p>记录生活中的点点滴滴</p>
  </div>

  <div class="stats">
    <div class="s-card g"><div class="s-user">用户 A</div><div class="s-num">12</div><div class="s-lbl">好事</div></div>
    <div class="s-card b"><div class="s-user">用户 A</div><div class="s-num">3</div><div class="s-lbl">坏事</div></div>
    <div class="s-card g"><div class="s-user">用户 B</div><div class="s-num">8</div><div class="s-lbl">好事</div></div>
    <div class="s-card b"><div class="s-user">用户 B</div><div class="s-num">5</div><div class="s-lbl">坏事</div></div>
  </div>

  <div class="btns">
    <button class="btn btn-g">+ 记录好事</button>
    <button class="btn btn-b">+ 记录坏事</button>
  </div>

  <div class="list-area">
    <div class="tabs">
      <button class="tab on">历史记录</button>
      <button class="tab">回收站</button>
    </div>
    <div class="evt g">
      <div class="evt-icon">✓</div>
      <div class="evt-body">
        <div class="evt-text">今天收到了一份意外的礼物</div>
        <div class="evt-meta">
          <span class="tag g">好事</span>
          <span>👤 A</span>
          <span>📌 朋友</span>
          <span>🕐 2分钟前</span>
        </div>
      </div>
    </div>
    <div class="evt b">
      <div class="evt-icon">✗</div>
      <div class="evt-body">
        <div class="evt-text">项目延期了一周</div>
        <div class="evt-meta">
          <span class="tag b">坏事</span>
          <span>👤 B</span>
          <span>📌 工作</span>
          <span>🕐 1小时前</span>
        </div>
      </div>
    </div>
    <div class="evt g">
      <div class="evt-icon">✓</div>
      <div class="evt-body">
        <div class="evt-text">学会了做一道新菜</div>
        <div class="evt-meta">
          <span class="tag g">好事</span>
          <span>👤 B</span>
          <span>📌 自己</span>
          <span>🕐 昨天</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
