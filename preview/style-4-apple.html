<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风格4: Apple 轻盈</title>
<style>
:root {
  --good: #34c759;
  --bad: #ff3b30;
  --fg: #1d1d1f;
  --fg2: #86868b;
  --bg: #ffffff;
  --bg2: #f5f5f7;
  --border: #d2d2d7;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg2); color:var(--fg); line-height:1.47; }
.wrap { max-width:680px; margin:0 auto; padding:20px; }

/* 头部 */
.head { text-align:center; padding:56px 0 40px; }
.head h1 { font-size:48px; font-weight:700; letter-spacing:-0.03em; }
.head p { color:var(--fg2); font-size:21px; margin-top:8px; font-weight:300; }

/* 统计 */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:32px; }
.s-card { background:var(--bg); border-radius:18px; padding:20px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,0.06); transition:transform .2s,box-shadow .2s; }
.s-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
.s-user { font-size:13px; color:var(--fg2); margin-bottom:8px; font-weight:500; }
.s-num { font-size:40px; font-weight:700; letter-spacing:-0.03em; line-height:1; margin-bottom:6px; }
.s-card.g .s-num { color:var(--good); }
.s-card.b .s-num { color:var(--bad); }
.s-lbl { font-size:15px; color:var(--fg2); }

/* 按钮 */
.btns { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:32px; }
.btn { padding:18px; border:none; border-radius:14px; font-size:17px; font-weight:600; color:#fff; cursor:pointer; transition:all .2s; letter-spacing:-0.01em; }
.btn:hover { transform:translateY(-1px); }
.btn-g { background:var(--good); }
.btn-g:hover { background:#2db84d; }
.btn-b { background:var(--bad); }
.btn-b:hover { background:#e0342a; }

/* 列表区 */
.list-area { background:var(--bg); border-radius:18px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.tabs { display:flex; background:var(--bg2); border-radius:10px; padding:4px; margin-bottom:20px; }
.tab { flex:1; padding:8px 12px; border:none; background:none; font-size:14px; font-weight:500; color:var(--fg2); cursor:pointer; border-radius:8px; transition:all .15s; }
.tab.on { background:var(--bg); color:var(--fg); box-shadow:0 1px 4px rgba(0,0,0,0.08); }

/* 事件 */
.evt { display:flex; align-items:flex-start; gap:14px; padding:16px; border-radius:14px; margin-bottom:8px; transition:background .15s; }
.evt:hover { background:var(--bg2); }
.evt-icon { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.evt.g .evt-icon { background:rgba(52,199,89,0.12); color:var(--good); }
.evt.b .evt-icon { background:rgba(255,59,48,0.12); color:var(--bad); }
.evt-body { flex:1; }
.evt-text { font-size:17px; font-weight:500; margin-bottom:6px; letter-spacing:-0.01em; }
.evt-meta { font-size:13px; color:var(--fg2); display:flex; gap:12px; flex-wrap:wrap; }
.tag { padding:3px 10px; border-radius:8px; font-size:12px; font-weight:600; }
.tag.g { background:rgba(52,199,89,0.12); color:var(--good); }
.tag.b { background:rgba(255,59,48,0.12); color:var(--bad); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>好事坏事记录</h1>
    <p>记录生活中的点点滴滴</p>
  </div>

  <div class="stats">
    <div class="s-card g"><div class="s-user">用户 A</div><div class="s-num">12</div><div class="s-lbl">好事</div></div>
    <div class="s-card b"><div class="s-user">用户 A</div><div class="s-num">3</div><div class="s-lbl">坏事</div></div>
    <div class="s-card g"><div class="s-user">用户 B</div><div class="s-num">8</div><div class="s-lbl">好事</div></div>
    <div class="s-card b"><div class="s-user">用户 B</div><div class="s-num">5</div><div class="s-lbl">坏事</div></div>
  </div>

  <div class="btns">
    <button class="btn btn-g">+ 记录好事</button>
    <button class="btn btn-b">+ 记录坏事</button>
  </div>

  <div class="list-area">
    <div class="tabs">
      <button class="tab on">历史记录</button>
      <button class="tab">回收站</button>
    </div>
    <div class="evt g">
      <div class="evt-icon">✓</div>
      <div class="evt-body">
        <div class="evt-text">今天收到了一份意外的礼物</div>
        <div class="evt-meta">
          <span class="tag g">好事</span>
          <span>👤 A</span>
          <span>📌 朋友</span>
          <span>🕐 2分钟前</span>
        </div>
      </div>
    </div>
    <div class="evt b">
      <div class="evt-icon">✗</div>
      <div class="evt-body">
        <div class="evt-text">项目延期了一周</div>
        <div class="evt-meta">
          <span class="tag b">坏事</span>
          <span>👤 B</span>
          <span>📌 工作</span>
          <span>🕐 1小时前</span>
        </div>
      </div>
    </div>
    <div class="evt g">
      <div class="evt-icon">✓</div>
      <div class="evt-body">
        <div class="evt-text">学会了做一道新菜</div>
        <div class="evt-meta">
          <span class="tag g">好事</span>
          <span>👤 B</span>
          <span>📌 自己</span>
          <span>🕐 昨天</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
